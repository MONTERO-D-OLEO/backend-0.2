# ConvertidorPro - Configuración de Deploy
# ═══════════════════════════════════════════
# 
# OPCIÓN 1: Solo frontend en Netlify (las conversiones PDF→Word usan backend externo)
# OPCIÓN 2: Fullstack en Render/Railway (todo en uno, recomendado)
#
# Si usas Netlify solo para el frontend, necesitas configurar
# el backend por separado en Render (ver instrucciones abajo).

[build]
  publish = "public"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ═══════════════════════════════════════════
# INSTRUCCIONES PARA DEPLOY:
#
# OPCIÓN RECOMENDADA — Render (Fullstack gratis):
# 1. Sube el proyecto a GitHub
# 2. Ve a https://render.com y crea un nuevo "Web Service"
# 3. Conecta tu repositorio de GitHub
# 4. Configura:
#    - Build Command: pip install -r requirements.txt
#    - Start Command: gunicorn app:app
# 5. Render te dará una URL como: https://tu-app.onrender.com
#
# ALTERNATIVA — Railway:
# 1. Ve a https://railway.app
# 2. Conecta tu repo de GitHub  
# 3. Railway detecta automáticamente Flask + Procfile
# ═══════════════════════════════════════════
